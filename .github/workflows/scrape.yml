name: Job Hub Scraper

on:
  schedule:
    # Run every 6 hours (4x/day for fresh data)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        working-directory: scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "job-hub-bot"
          git config user.email "job-hub-bot@users.noreply.github.com"
          git add data/jobs.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🦞 Job Hub: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
