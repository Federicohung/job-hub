<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 Job Hub — Mercado Hispano</title>
<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --text: #f1f5f9; --muted: #94a3b8; --accent: #ef4444;
  --green: #22c55e; --blue: #3b82f6; --yellow: #eab308; --purple: #a855f7;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-bottom: 1px solid var(--surface2);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 22px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; gap: 12px; align-items: center; }

.btn {
  padding: 8px 18px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #dc2626; }
.btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--surface2); }
.btn-outline:hover { background: var(--surface2); }
.btn-outline.active { background: var(--accent); color: white; border-color: var(--accent); }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
}
.badge-remote { background: #22c55e20; color: var(--green); }
.badge-hybrid { background: #eab30820; color: var(--yellow); }
.badge-onsite { background: #3b82f620; color: var(--blue); }
.badge-src { background: var(--surface2); color: var(--muted); font-size: 10px; }

.stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px; padding: 20px 32px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--surface2);
  border-radius: var(--radius); padding: 14px 16px; text-align: center;
}
.stat-num { font-size: 28px; font-weight: 800; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.stat-num.red { color: var(--accent); }
.stat-num.green { color: var(--green); }
.stat-num.blue { color: var(--blue); }
.stat-num.yellow { color: var(--yellow); }

.toolbar {
  padding: 0 32px 12px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.search-box {
  flex: 1; min-width: 200px; padding: 8px 14px; border-radius: var(--radius);
  border: 1px solid var(--surface2); background: var(--surface); color: var(--text);
  font-size: 13px; outline: none;
}
.search-box:focus { border-color: var(--accent); }

.meta {
  padding: 0 32px 8px; font-size: 12px; color: var(--muted);
  display: flex; justify-content: space-between;
}

.jobs-list { padding: 0 32px 32px; }

.job-card {
  background: var(--surface); border: 1px solid var(--surface2);
  border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px;
  display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;
  transition: border-color .15s;
}
.job-card:hover { border-color: var(--accent); }

.job-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
.job-title a { color: var(--text); text-decoration: none; }
.job-title a:hover { color: var(--accent); }
.job-company { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.job-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.job-location { font-size: 12px; color: var(--muted); }
.job-salary { font-size: 12px; color: var(--green); font-weight: 500; }
.job-source { font-size: 11px; color: var(--surface2); }
.job-tags { display: flex; gap: 6px; margin-top: 6px; }

.job-actions { display: flex; flex-direction: column; align-items: end; gap: 6px; }

.loading {
  text-align: center; padding: 40px; color: var(--muted); font-size: 14px;
}
.spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--surface2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.webhook-box {
  background: var(--surface); border: 1px solid var(--surface2);
  border-radius: var(--radius); padding: 14px 18px; margin: 0 32px 16px;
  font-size: 12px;
}
.webhook-box label { color: var(--muted); display: block; margin-bottom: 4px; }
.webhook-box code {
  background: var(--bg); padding: 6px 10px; border-radius: 6px;
  font-size: 12px; color: var(--green); display: block; word-break: break-all;
  cursor: pointer; border: 1px solid var(--surface2);
}
.webhook-box code:hover { border-color: var(--accent); }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }

@media (max-width: 600px) {
  .header, .stats, .toolbar, .meta, .jobs-list, .webhook-box { padding-left: 16px; padding-right: 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .job-card { grid-template-columns: 1fr; }
  .job-actions { flex-direction: row; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🦞 <span>Job Hub</span> — Mercado Hispano</h1>
  <div class="header-right">
    <span id="updated-label" style="font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-primary" id="refresh-btn" onclick="refreshData()">🔄 Renovar</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="webhook-box">
  <label>🔗 Webhook — Conecta tu sistema:</label>
  <code id="webhook-url" onclick="copyWebhook()">Cargando...</code>
</div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="Buscar por título, empresa..." oninput="applyFilters()">
  <button class="btn btn-outline active" data-cat="all" onclick="setCategory(this)">Todos</button>
  <button class="btn btn-outline" data-cat="remote" onclick="setCategory(this)">🌐 Remoto</button>
  <button class="btn btn-outline" data-cat="remote-spanish" onclick="setCategory(this)">🇪🇸 Español</button>
  <button class="btn btn-outline" data-cat="remote-latam" onclick="setCategory(this)">🌎 LATAM</button>
  <button class="btn btn-outline" data-cat="remote-spain" onclick="setCategory(this)">🇪🇸 España</button>
  <button class="btn btn-outline" data-cat="hybrid" onclick="setCategory(this)">🏢 Híbrido</button>
  <button class="btn btn-outline" data-cat="onsite" onclick="setCategory(this)">📍 Presencial</button>
</div>

<div class="meta">
  <span id="count-label"></span>
  <span id="page-label"></span>
</div>

<div class="jobs-list" id="jobs-list">
  <div class="loading"><div class="spinner"></div><br>Cargando vacantes...</div>
</div>

<div style="text-align:center;padding:16px;" id="pagination"></div>

<script>
let allJobs = [];
let filteredJobs = [];
let currentCat = 'all';
let currentPage = 1;
const PER_PAGE = 50;

async function loadData() {
  try {
    const resp = await fetch('/api/jobs?per_page=1000');
    const data = await resp.json();
    allJobs = data.jobs || [];
    renderStats(data.breakdown || {});
    document.getElementById('updated-label').textContent = data.updatedAt ? '✅ ' + new Date(data.updatedAt).toLocaleString('es-CL') : '';
    document.getElementById('webhook-url').textContent = window.location.origin + '/api/jobs';
    applyFilters();
  } catch(e) {
    document.getElementById('jobs-list').innerHTML = '<div class="empty">Error cargando datos. Intenta renovar.</div>';
  }
}

function renderStats(bd) {
  const total = Object.values(bd).reduce((a,b) => a+b, 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num red">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num green">${bd['remote-spanish']||0}</div><div class="stat-label">Remote ES</div></div>
    <div class="stat-card"><div class="stat-num green">${bd['remote-latam']||0}</div><div class="stat-label">Remote LATAM</div></div>
    <div class="stat-card"><div class="stat-num green">${bd['remote-spain']||0}</div><div class="stat-label">Remote España</div></div>
    <div class="stat-card"><div class="stat-num blue">${bd['hybrid-latam']||0 + bd['hybrid-spain']||0}</div><div class="stat-label">Híbrido</div></div>
    <div class="stat-card"><div class="stat-num yellow">${bd['onsite-latam']||0 + bd['onsite-spain']||0}</div><div class="stat-label">Presencial</div></div>
  `;
}

function setCategory(btn) {
  document.querySelectorAll('.toolbar .btn-outline').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();

  filteredJobs = allJobs.filter(j => {
    if (currentCat === 'remote' && !j.remote) return false;
    if (currentCat === 'hybrid' && !j.locationPriority?.startsWith('hybrid')) return false;
    if (currentCat === 'onsite' && !j.locationPriority?.startsWith('onsite')) return false;
    if (['remote-spanish','remote-latam','remote-spain'].includes(currentCat) && j.locationPriority !== currentCat) return false;
    if (search && !j.title?.toLowerCase().includes(search) && !j.company?.toLowerCase().includes(search)) return false;
    return true;
  });

  renderJobs();
}

function renderJobs() {
  const total = filteredJobs.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PER_PAGE;
  const page = filteredJobs.slice(start, start + PER_PAGE);

  document.getElementById('count-label').textContent = `${total} vacantes encontradas`;
  document.getElementById('page-label').textContent = `Página ${currentPage} de ${totalPages}`;

  if (page.length === 0) {
    document.getElementById('jobs-list').innerHTML = '<div class="empty">No se encontraron vacantes con estos filtros.</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const html = page.map(j => {
    const badgeClass = j.remote ? 'badge-remote' : j.locationPriority?.startsWith('hybrid') ? 'badge-hybrid' : 'badge-onsite';
    const badgeText = j.remote ? 'Remoto' : j.locationPriority?.startsWith('hybrid') ? 'Híbrido' : 'Presencial';
    const salary = j.salary && j.salary !== 'No publicado' ? `<span class="job-salary">💰 ${j.salary}</span>` : '';
    return `
      <div class="job-card">
        <div>
          <div class="job-title"><a href="${j.sourceUrl}" target="_blank" rel="noopener">${esc(j.title)}</a></div>
          <div class="job-company">${esc(j.company)} ${j.location ? '· ' + esc(j.location) : ''}</div>
          <div class="job-meta">
            <span class="badge ${badgeClass}">${badgeText}</span>
            ${salary}
            <span class="job-source">${j.source || ''}</span>
          </div>
        </div>
        <div class="job-actions">
          <a href="${j.sourceUrl}" target="_blank" rel="noopener" class="btn btn-outline" style="font-size:11px;padding:4px 12px;">Ver oferta →</a>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('jobs-list').innerHTML = html;

  // Pagination
  let pagHtml = '';
  if (totalPages > 1) {
    pagHtml += `<button class="btn btn-outline" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>← Anterior</button> `;
    const pages = [];
    for (let i = 1; i <= Math.min(totalPages, 10); i++) pages.push(i);
    if (totalPages > 10) pages.push('...', totalPages);
    pages.forEach(p => {
      if (p === '...') pagHtml += ' ... ';
      else pagHtml += `<button class="btn btn-outline ${p===currentPage?'active':''}" onclick="goPage(${p})" style="padding:4px 10px;font-size:12px;">${p}</button> `;
    });
    pagHtml += ` <button class="btn btn-outline" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>Siguiente →</button>`;
  }
  document.getElementById('pagination').innerHTML = pagHtml;
}

function goPage(p) { currentPage = p; applyFilters(); window.scrollTo({top:0, behavior:'smooth'}); }

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = '⏳ Renovando...';
  document.getElementById('jobs-list').innerHTML = '<div class="loading"><div class="spinner"></div><br>Buscando vacantes nuevas...</div>';

  try {
    const resp = await fetch('/api/refresh', { method: 'POST' });
    const res = await resp.json();

    if (res.success) {
      // Poll until done
      pollRefresh(0);
    } else {
      btn.disabled = false; btn.textContent = '🔄 Renovar';
      document.getElementById('jobs-list').innerHTML = '<div class="empty">Ya hay una renovación en curso. Espera un momento.</div>';
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔄 Renovar';
    document.getElementById('jobs-list').innerHTML = '<div class="empty">Error iniciando renovación.</div>';
  }
}

function pollRefresh(attempt) {
  if (attempt > 120) {
    document.getElementById('jobs-list').innerHTML = '<div class="empty">La renovación está tomando mucho tiempo. Recarga la página.</div>';
    return;
  }
  setTimeout(async () => {
    try {
      const resp = await fetch('/api/stats');
      const stats = await resp.json();
      if (!stats.refreshing) {
        loadData();
        const btn = document.getElementById('refresh-btn');
        btn.disabled = false; btn.textContent = '🔄 Renovar';
      } else {
        pollRefresh(attempt + 1);
      }
    } catch(e) { pollRefresh(attempt + 1); }
  }, 3000);
}

function copyWebhook() {
  const url = document.getElementById('webhook-url').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const el = document.getElementById('webhook-url');
    const orig = el.textContent;
    el.textContent = '✅ Copiado!';
    setTimeout(() => el.textContent = orig, 1500);
  });
}

loadData();
</script>
</body>
</html>
