name: Job Hub Scraper

on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl_cffi cssselect lxml requests

      - name: Run scraper
        working-directory: scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "job-hub-bot"
          git config user.email "job-hub-bot@users.noreply.github.com"
          git add scraper/data/jobs.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🦞 job data update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
