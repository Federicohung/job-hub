<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 Job Hub — Mercado Hispano</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#ef4444;--green:#22c55e;--blue:#3b82f6;--yellow:#eab308;--purple:#a855f7;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--surface2);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;font-weight:700}.header h1 span{color:var(--accent)}
.header-right{display:flex;gap:12px;align-items:center}
.btn{padding:8px 18px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#dc2626}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--surface2)}.btn-outline:hover{background:var(--surface2)}
.btn-outline.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-remote{background:#22c55e20;color:var(--green)}.badge-hybrid{background:#eab30820;color:var(--yellow)}.badge-onsite{background:#3b82f620;color:var(--blue)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:20px 32px}
.stat-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:12px 14px;text-align:center}
.stat-num{font-size:26px;font-weight:800}.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-num.red{color:var(--accent)}.stat-num.green{color:var(--green)}.stat-num.blue{color:var(--blue)}.stat-num.yellow{color:var(--yellow)}.stat-num.purple{color:var(--purple)}
.toolbar{padding:8px 32px 4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
select.filter-select{padding:8px 12px;border-radius:var(--radius);border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:13px;outline:none;cursor:pointer}
select.filter-select:focus{border-color:var(--accent)}
.meta{padding:4px 32px 8px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
.jobs-list{padding:0 32px 32px}
.job-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:14px 18px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;transition:border-color .15s}
.job-card:hover{border-color:var(--accent)}
.job-title{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3}
.job-title a{color:var(--text);text-decoration:none}.job-title a:hover{color:var(--accent)}
.job-company{font-size:12px;color:var(--muted);margin-bottom:4px}
.job-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.job-salary{font-size:12px;color:var(--green);font-weight:500}
.job-actions{display:flex;flex-direction:column;align-items:end;gap:6px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.webhook-box{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:14px 18px;margin:0 32px 12px;font-size:12px}
.webhook-box label{color:var(--muted);display:block;margin-bottom:4px}
.webhook-box code{background:var(--bg);padding:6px 10px;border-radius:6px;font-size:11px;color:var(--green);display:block;word-break:break-all;cursor:pointer;border:1px solid var(--surface2)}
.webhook-box code:hover{border-color:var(--accent)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
@media(max-width:600px){.header,.stats,.toolbar,.meta,.jobs-list,.webhook-box{padding-left:14px;padding-right:14px}.stats{grid-template-columns:repeat(3,1fr)}.job-card{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>🦞 <span>Job Hub</span> — Mercado Hispano</h1>
  <div class="header-right">
    <span id="updated-label" style="font-size:11px;color:var(--muted)"></span>
    <a class="btn btn-outline" href="https://github.com/Federicohung/job-hub/actions" target="_blank" style="font-size:12px;padding:6px 14px">⚙️ Renovar</a>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="webhook-box">
  <label>🔗 Webhook endpoint — conecta tu sistema:</label>
  <code id="webhook-url" onclick="copyWebhook()">Cargando...</code>
</div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="🔍 Buscar título, empresa..." oninput="applyFilters()">
  <select class="filter-select" id="source-filter" onchange="applyFilters()">
    <option value="">📁 Todas las fuentes</option>
  </select>
  <button class="btn btn-outline active" data-cat="all" onclick="setCat(this)">Todos</button>
  <button class="btn btn-outline" data-cat="remote" onclick="setCat(this)">🌐 Remoto</button>
  <button class="btn btn-outline" data-cat="remote-latam" onclick="setCat(this)">🌎 LATAM</button>
  <button class="btn btn-outline" data-cat="remote-spain" onclick="setCat(this)">🇪🇸 España</button>
  <button class="btn btn-outline" data-cat="hybrid" onclick="setCat(this)">🏢 Híbrido</button>
  <button class="btn btn-outline" data-cat="onsite" onclick="setCat(this)">📍 Presencial</button>
</div>

<div class="meta">
  <span id="count-label"></span>
  <span id="page-label"></span>
</div>

<div class="jobs-list" id="jobs-list">
  <div class="loading"><div class="spinner"></div><br>Cargando vacantes...</div>
</div>

<div style="text-align:center;padding:16px" id="pagination"></div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/Federicohung/job-hub/master/scraper/data/jobs.json';
let allJobs=[],filtered=[],curCat='all',curPage=1;const PP=60;

async function load(){
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    const d=await r.json();
    allJobs=d.jobs||[];
    renderStats(d.breakdown||{});
    document.getElementById('updated-label').textContent=d.updatedAt?'✅ '+new Date(d.updatedAt).toLocaleString('es-CL'):'';
    document.getElementById('webhook-url').textContent=DATA_URL;
    // Populate source filter
    const sources=[...new Set(allJobs.map(j=>j.source))].sort();
    const sel=document.getElementById('source-filter');
    sel.innerHTML='<option value="">📁 Todas las fuentes</option>'+sources.map(s=>`<option value="${s}">${s}</option>`).join('');
    applyFilters();
  }catch(e){document.getElementById('jobs-list').innerHTML='<div class="empty">Error cargando datos.</div>'}
}

function renderStats(bd){
  const t=Object.values(bd).reduce((a,b)=>a+b,0);
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-num red">${t}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num green">${(bd['remote-spanish']||0)+(bd['remote-latam']||0)+(bd['remote-spain']||0)+(bd['remote-global']||0)}</div><div class="stat-label">🌐 Remoto</div></div>
    <div class="stat-card"><div class="stat-num blue">${(bd['hybrid-latam']||0)+(bd['hybrid-spain']||0)}</div><div class="stat-label">🏢 Híbrido</div></div>
    <div class="stat-card"><div class="stat-num yellow">${(bd['onsite-latam']||0)+(bd['onsite-spain']||0)}</div><div class="stat-label">📍 Presencial</div></div>`;
}

function setCat(btn){
  document.querySelectorAll('.toolbar .btn-outline[data-cat]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');curCat=btn.dataset.cat;curPage=1;applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const src=document.getElementById('source-filter').value;
  filtered=allJobs.filter(j=>{
    if(curCat==='remote'&&!j.remote)return false;
    if(curCat==='hybrid'&&!j.locationPriority?.startsWith('hybrid'))return false;
    if(curCat==='onsite'&&!j.locationPriority?.startsWith('onsite'))return false;
    if(['remote-spanish','remote-latam','remote-spain'].includes(curCat)&&j.locationPriority!==curCat)return false;
    if(src&&j.source!==src)return false;
    if(q&&!j.title?.toLowerCase().includes(q)&&!j.company?.toLowerCase().includes(q))return false;
    return true;
  });
  render();
}

function render(){
  const t=filtered.length,tp=Math.max(1,Math.ceil(t/PP));
  if(curPage>tp)curPage=tp;
  const s=(curPage-1)*PP,p=filtered.slice(s,s+PP);
  document.getElementById('count-label').textContent=t+' vacantes';
  document.getElementById('page-label').textContent='Pág '+curPage+'/'+tp;
  if(!p.length){document.getElementById('jobs-list').innerHTML='<div class="empty">Sin resultados.</div>';document.getElementById('pagination').innerHTML='';return;}
  document.getElementById('jobs-list').innerHTML=p.map(j=>{
    const bc=j.remote?'badge-remote':j.locationPriority?.startsWith('hybrid')?'badge-hybrid':'badge-onsite';
    const bt=j.remote?'Remoto':j.locationPriority?.startsWith('hybrid')?'Híbrido':'Presencial';
    const sal=j.salary&&j.salary!=='No publicado'?`<span class="job-salary">💰 ${esc(j.salary)}</span>`:'';
    const srcLabel=j.source||'';
    return `<div class="job-card">
      <div>
        <div class="job-title"><a href="${j.sourceUrl}" target="_blank" rel="noopener">${esc(j.title)}</a></div>
        <div class="job-company">${esc(j.company)}${j.location?' · '+esc(j.location):''}</div>
        <div class="job-meta"><span class="badge ${bc}">${bt}</span>${sal}<span class="job-source">${srcLabel}</span></div>
      </div>
      <div class="job-actions"><a href="${j.sourceUrl}" target="_blank" rel="noopener" class="btn btn-outline" style="font-size:11px;padding:4px 12px">Ver →</a></div>
    </div>`;
  }).join('');
  let ph='';
  if(tp>1){
    ph+=`<button class="btn btn-outline" onclick="go(${curPage-1})" ${curPage<=1?'disabled':''}>←</button> `;
    for(let i=1;i<=Math.min(tp,9);i++)ph+=`<button class="btn btn-outline ${i===curPage?'active':''}" onclick="go(${i})" style="padding:4px 10px;font-size:12px">${i}</button> `;
    if(tp>9)ph+=' ... ';
    ph+=`<button class="btn btn-outline" onclick="go(${curPage+1})" ${curPage>=tp?'disabled':''}>→</button>`;
  }
  document.getElementById('pagination').innerHTML=ph;
}

function go(p){curPage=p;applyFilters();window.scrollTo({top:0,behavior:'smooth'})}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function copyWebhook(){navigator.clipboard.writeText(DATA_URL).then(()=>{const e=document.getElementById('webhook-url'),o=e.textContent;e.textContent='✅ Copiado!';setTimeout(()=>e.textContent=o,1500)})}

load();
</script>
</body>
</html>
