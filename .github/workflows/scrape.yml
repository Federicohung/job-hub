name: Job Hub Scraper & Sync

on:
  schedule:
    - cron: '0 8 * * *'   # Batch 1: 08:00 UTC (05:00 Santiago)
    - cron: '0 20 * * *'  # Batch 2: 20:00 UTC (17:00 Santiago)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl_cffi cssselect lxml requests

      - name: Phase 1 — Scrape all sources
        working-directory: scraper
        run: python scraper.py

      - name: Phase 2 — Sync to persistent database
        working-directory: scraper
        run: python sync.py

      - name: Commit updated data
        run: |
          git config user.name "job-hub-bot"
          git config user.email "job-hub-bot@users.noreply.github.io"
          git add scraper/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🦞 sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
