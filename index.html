<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 Job Hub — Mercado Hispano</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#ef4444;--green:#22c55e;--blue:#3b82f6;--yellow:#eab308;--purple:#a855f7;--orange:#f97316;--cyan:#22d3ee;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--surface2);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;font-weight:700}.header h1 span{color:var(--accent)}
.header-right{display:flex;gap:12px;align-items:center}
.btn{padding:8px 18px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#dc2626}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--surface2)}.btn-outline:hover{background:var(--surface2)}
.btn-outline.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sync{background:var(--green);color:#fff;border:none;cursor:pointer}.btn-sync:hover{background:#16a34a}
.btn-sync:disabled{background:#475569;cursor:not-allowed;opacity:.7}
.btn-sm{padding:6px 12px;font-size:11px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-remote{background:#22c55e20;color:var(--green)}.badge-hybrid{background:#eab30820;color:var(--yellow)}.badge-onsite{background:#3b82f620;color:var(--blue)}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 32px;background:var(--surface);border-bottom:1px solid var(--surface2)}
.tab{padding:12px 24px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:20px 32px}
.stat-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:12px 14px;text-align:center}
.stat-num{font-size:26px;font-weight:800}.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-num.red{color:var(--accent)}.stat-num.green{color:var(--green)}.stat-num.blue{color:var(--blue)}.stat-num.yellow{color:var(--yellow)}.stat-num.purple{color:var(--purple)}.stat-num.orange{color:var(--orange)}.stat-num.cyan{color:var(--cyan)}

/* Toolbar */
.toolbar{padding:8px 32px 4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
select.filter-select{padding:8px 12px;border-radius:var(--radius);border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:13px;outline:none;cursor:pointer}
select.filter-select:focus{border-color:var(--accent)}
.meta{padding:4px 32px 8px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
.jobs-list{padding:0 32px 32px}

/* Job cards */
.job-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:14px 18px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;transition:border-color .15s}
.job-card:hover{border-color:var(--accent)}
.job-title{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3}
.job-title a{color:var(--text);text-decoration:none}.job-title a:hover{color:var(--accent)}
.job-company{font-size:12px;color:var(--muted);margin-bottom:4px}
.job-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.job-salary{font-size:12px;color:var(--green);font-weight:500}
.job-source{font-size:10px;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:4px}
.job-actions{display:flex;flex-direction:column;align-items:end;gap:6px}

/* Sync panel */
.sync-panel{padding:20px 32px}
.sync-status-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.sync-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.sync-title{font-size:18px;font-weight:700}
.sync-progress-container{margin:20px 0}
.sync-progress-bar{height:16px;background:var(--bg);border-radius:8px;overflow:hidden;position:relative}
.sync-progress-fill{height:100%;border-radius:8px;transition:width 2s ease;background:linear-gradient(90deg,var(--green),var(--cyan));position:relative}
.sync-progress-fill.running{background:linear-gradient(90deg,var(--blue),var(--cyan),var(--green));background-size:200% 100%;animation:shimmer 2s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sync-progress-fill.error{background:var(--accent);animation:none}
.sync-progress-text{text-align:center;font-size:13px;color:var(--muted);margin-top:8px}
.sync-phase{display:inline-block;padding:4px 12px;background:var(--surface2);border-radius:6px;font-size:11px;color:var(--text);margin-top:8px}
.sync-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px}
.sync-stat{background:var(--bg);border-radius:8px;padding:10px 14px;text-align:center}
.sync-stat-num{font-size:20px;font-weight:800}.sync-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.sync-schedule{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.sync-time{font-size:12px;padding:6px 12px;background:var(--bg);border-radius:6px;border:1px solid var(--surface2)}
.sync-time strong{color:var(--text)}

/* Token setup */
.token-setup{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.token-setup h3{font-size:14px;margin-bottom:8px}
.token-setup p{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.token-setup a{color:var(--cyan)}
.token-row{display:flex;gap:8px;align-items:center}
.token-input{flex:1;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--surface2);background:var(--bg);color:var(--text);font-size:12px;font-family:monospace;outline:none}
.token-input:focus{border-color:var(--green)}
.token-status{font-size:11px;margin-left:8px}

/* Sync history */
.sync-history{margin-top:16px}
.sync-history-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
.sync-history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:12px;gap:8px;flex-wrap:wrap}
.sync-history-time{color:var(--muted)}.sync-history-msg{color:var(--text)}
.sync-history-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}

/* Sources tab */
.sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:20px 32px}
.source-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:16px 18px;transition:border-color .2s}
.source-card:hover{border-color:var(--accent)}
.source-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.source-name{font-size:14px;font-weight:700}
.source-count{font-size:22px;font-weight:800;color:var(--accent)}
.source-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:10px}
.source-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.source-details{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.source-detail{font-size:11px;color:var(--muted)}.source-detail span{color:var(--text);font-weight:600}
.source-status{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.status-ok{background:#22c55e20;color:var(--green)}.status-warn{background:#eab30820;color:var(--yellow)}.status-off{background:#ef444420;color:var(--accent)}.status-blocked{background:#94a3b820;color:var(--muted)}

/* Sources summary */
.sources-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:20px 32px}
.sources-pie{padding:20px 32px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.pie-chart{width:160px;height:160px;border-radius:50%;position:relative;flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:6px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Webhook */
.webhook-box{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:14px 18px;margin:0 32px 12px;font-size:12px}
.webhook-box label{color:var(--muted);display:block;margin-bottom:4px}
.webhook-box code{background:var(--bg);padding:6px 10px;border-radius:6px;font-size:11px;color:var(--green);display:block;word-break:break-all;cursor:pointer;border:1px solid var(--surface2)}
.webhook-box code:hover{border-color:var(--accent)}

.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
@media(max-width:600px){.header,.stats,.toolbar,.meta,.jobs-list,.webhook-box,.sources-grid,.sources-summary,.sources-pie,.sync-panel,.token-setup{padding-left:14px;padding-right:14px}.stats{grid-template-columns:repeat(3,1fr)}.job-card{grid-template-columns:1fr}.sources-grid{grid-template-columns:1fr}.tab{padding:10px 14px;font-size:12px}.sync-stats{grid-template-columns:repeat(2,1fr)}.token-row{flex-direction:column}.sync-header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<div class="header">
  <h1>🦞 <span>Job Hub</span> — Mercado Hispano</h1>
  <div class="header-right">
    <span id="updated-label" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn btn-sync" id="header-sync-btn" onclick="triggerSyncFromHeader()">🔄 Sync</button>
    <a class="btn btn-outline btn-sm" href="https://github.com/Federicohung/job-hub/actions" target="_blank" style="font-size:11px">⚙️ Actions</a>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="jobs" onclick="switchTab(this)">📋 Vacantes</div>
  <div class="tab" data-tab="sync" onclick="switchTab(this)">🔄 Sync</div>
  <div class="tab" data-tab="sources" onclick="switchTab(this)">📡 Fuentes</div>
</div>

<!-- TAB: Vacantes -->
<div class="tab-content active" id="tab-jobs">
  <div class="stats" id="stats"></div>
  <div class="webhook-box">
    <label>🔗 Webhook endpoint — conecta tu sistema:</label>
    <code id="webhook-url" onclick="copyWebhook()">Cargando...</code>
  </div>
  <div class="toolbar">
    <input class="search-box" id="search" placeholder="🔍 Buscar título, empresa..." oninput="applyFilters()">
    <select class="filter-select" id="source-filter" onchange="applyFilters()">
      <option value="">📁 Todas las fuentes</option>
    </select>
    <button class="btn btn-outline active" data-cat="all" onclick="setCat(this)">Todos</button>
    <button class="btn btn-outline" data-cat="remote" onclick="setCat(this)">🌐 Remoto</button>
    <button class="btn btn-outline" data-cat="remote-latam" onclick="setCat(this)">🌎 LATAM</button>
    <button class="btn btn-outline" data-cat="remote-spain" onclick="setCat(this)">🇪🇸 España</button>
    <button class="btn btn-outline" data-cat="hybrid" onclick="setCat(this)">🏢 Híbrido</button>
    <button class="btn btn-outline" data-cat="onsite" onclick="setCat(this)">📍 Presencial</button>
  </div>
  <div class="meta">
    <span id="count-label"></span>
    <span id="page-label"></span>
  </div>
  <div class="jobs-list" id="jobs-list">
    <div class="loading"><div class="spinner"></div><br>Cargando vacantes...</div>
  </div>
  <div style="text-align:center;padding:16px" id="pagination"></div>
</div>

<!-- TAB: Sync -->
<div class="tab-content" id="tab-sync">
  <div class="sync-panel" id="sync-panel">
    <div class="loading"><div class="spinner"></div><br>Cargando estado de sincronización...</div>
  </div>
</div>

<!-- TAB: Fuentes -->
<div class="tab-content" id="tab-sources">
  <div class="sources-summary" id="sources-summary"></div>
  <div class="sources-pie" id="sources-pie"></div>
  <div class="sources-grid" id="sources-grid">
    <div class="loading"><div class="spinner"></div><br>Cargando fuentes...</div>
  </div>
</div>

<script>
// ── Config ──
const DATA_URL='https://raw.githubusercontent.com/Federicohung/job-hub/master/scraper/data/jobs.json';
const SYNC_URL='https://raw.githubusercontent.com/Federicohung/job-hub/master/scraper/data/sync_log.json';
const HISTORY_URL='https://raw.githubusercontent.com/Federicohung/job-hub/master/scraper/data/sync_history.json';
const REPO='Federicohung/job-hub';
const WORKFLOW_ID='scrape.yml';
const TOKEN_KEY='jobhub_gh_token';
let allJobs=[],filtered=[],curCat='all',curPage=1;const PP=60;
let syncPolling=null;
let syncRunId=null;
let isSyncing=false;

// ── Source metadata ──
const SOURCE_META={
  'remotive':{name:'Remotive',type:'API',icon:'🔌',color:'#3b82f6'},
  'arbeitnow':{name:'Arbeitnow',type:'API',icon:'🔌',color:'#8b5cf6'},
  'remoteok':{name:'RemoteOK',type:'API',icon:'🔌',color:'#06b6d4'},
  'torre':{name:'Torre',type:'API',icon:'🔌',color:'#f59e0b'},
  'linkedin':{name:'LinkedIn',type:'Scraping',icon:'🤖',color:'#0a66c2'},
  'computrabajo-cl':{name:'Computrabajo Chile',type:'Scraping',icon:'🤖',color:'#ef4444'},
  'computrabajo-mx':{name:'Computrabajo México',type:'Scraping',icon:'🤖',color:'#22c55e'},
  'computrabajo-co':{name:'Computrabajo Colombia',type:'Scraping',icon:'🤖',color:'#f59e0b'},
  'computrabajo-ar':{name:'Computrabajo Argentina',type:'Scraping',icon:'🤖',color:'#60a5fa'},
  'computrabajo-pe':{name:'Computrabajo Perú',type:'Scraping',icon:'🤖',color:'#ef4444'},
  'computrabajo-es':{name:'Computrabajo España',type:'Scraping',icon:'🤖',color:'#f97316'},
  'infojobs':{name:'InfoJobs España',type:'Scraping',icon:'🤖',color:'#ef4444'},
  'getonboard':{name:'GetOnBoard',type:'Scraping',icon:'🤖',color:'#22d3ee'},
  'getonboard-cl':{name:'GetOnBoard Chile',type:'Scraping',icon:'🤖',color:'#22d3ee'},
  'getonboard-pe':{name:'GetOnBoard Perú',type:'Scraping',icon:'🤖',color:'#22d3ee'},
  'getonboard-co':{name:'GetOnBoard Colombia',type:'Scraping',icon:'🤖',color:'#22d3ee'},
  'getonboard-ar':{name:'GetOnBoard Argentina',type:'Scraping',icon:'🤖',color:'#22d3ee'},
  'getonboard-mx':{name:'GetOnBoard México',type:'Scraping',icon:'🤖',color:'#22d3ee'},
  'laborum-cl':{name:'Laborum Chile',type:'Scraping',icon:'🤖',color:'#a855f7'},
  'laborum-pe':{name:'Laborum Perú',type:'Scraping',icon:'🤖',color:'#a855f7'},
  'laborum-ar':{name:'Laborum Argentina',type:'Scraping',icon:'🤖',color:'#a855f7'},
  'bumeran-ar':{name:'Bumeran Argentina',type:'Scraping',icon:'🤖',color:'#10b981'},
  'bumeran-pe':{name:'Bumeran Perú',type:'Scraping',icon:'🤖',color:'#10b981'},
  'bumeran-co':{name:'Bumeran Colombia',type:'Scraping',icon:'🤖',color:'#10b981'},
  'bumeran-mx':{name:'Bumeran México',type:'Scraping',icon:'🤖',color:'#10b981'},
  'bumeran-cl':{name:'Bumeran Chile',type:'Scraping',icon:'🤖',color:'#10b981'},
  'indeed-cl':{name:'Indeed Chile',type:'Scraping',icon:'🤖',color:'#2557a7'},
  'indeed-es':{name:'Indeed España',type:'Scraping',icon:'🤖',color:'#2557a7'},
  'indeed-mx':{name:'Indeed México',type:'Scraping',icon:'🤖',color:'#2557a7'},
  'indeed-co':{name:'Indeed Colombia',type:'Scraping',icon:'🤖',color:'#2557a7'},
  'indeed-ar':{name:'Indeed Argentina',type:'Scraping',icon:'🤖',color:'#2557a7'},
  'indeed-pe':{name:'Indeed Perú',type:'Scraping',icon:'🤖',color:'#2557a7'},
};

function getSourceMeta(src){
  const m=SOURCE_META[src];
  if(m)return m;
  if(src.startsWith('computrabajo-'))return{name:'Computrabajo '+src.split('-')[1].toUpperCase(),type:'Scraping',icon:'🤖',color:'#ef4444'};
  if(src.startsWith('getonboard'))return{name:'GetOnBoard '+(src.split('-')[1]||'').toUpperCase(),type:'Scraping',icon:'🤖',color:'#22d3ee'};
  if(src.startsWith('laborum'))return{name:'Laborum '+src.split('-')[1].toUpperCase(),type:'Scraping',icon:'🤖',color:'#a855f7'};
  if(src.startsWith('bumeran'))return{name:'Bumeran '+src.split('-')[1].toUpperCase(),type:'Scraping',icon:'🤖',color:'#10b981'};
  if(src.startsWith('indeed-'))return{name:'Indeed '+src.split('-')[1].toUpperCase(),type:'Scraping',icon:'🤖',color:'#2557a7'};
  return{name:src,type:'?',icon:'❓',color:'#94a3b8'};
}

// ── Tab switching ──
function switchTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+el.dataset.tab).classList.add('active');
}

// ── Token management ──
function getToken(){return localStorage.getItem(TOKEN_KEY)}
function saveToken(t){localStorage.setItem(TOKEN_KEY,t)}
function clearToken(){localStorage.removeItem(TOKEN_KEY)}
function hasToken(){return!!getToken()}

// ── GitHub Actions API ──
async function ghApi(path,opts={}){
  const token=getToken();
  if(!token)return null;
  const headers={'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json',...opts.headers};
  const resp=await fetch('https://api.github.com'+path,{...opts,headers});
  if(resp.status===401){clearToken();showToast('🔑 Token inválido — configurá de nuevo','error');return null}
  if(resp.status===403){showToast('⛔ Sin permisos — el token necesita scope: repo + workflow','error');return null}
  return resp;
}

async function triggerWorkflow(){
  if(isSyncing){showToast('⏳ Sync ya en progreso','warn');return}
  const token=getToken();
  if(!token){showToast('🔑 Configurá tu GitHub token primero','warn');return}

  isSyncing=true;
  setSyncButtonState('triggering');
  showToast('🚀 Disparando workflow...','info');

  const resp=await ghApi(`/repos/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`,{
    method:'POST',body:JSON.stringify({ref:'master'})
  });

  if(!resp){isSyncing=false;setSyncButtonState('idle');return}

  if(resp.status===204){
    showToast('✅ Workflow disparado — monitoreando progreso...','ok');
    setSyncButtonState('monitoring');
    // Wait a moment then start polling
    setTimeout(()=>startPolling(),5000);
  }else{
    showToast('❌ Error al disparar workflow (HTTP '+resp.status+')','error');
    isSyncing=false;
    setSyncButtonState('idle');
  }
}

async function startPolling(){
  if(syncPolling)clearInterval(syncPolling);
  let elapsed=0;
  const maxWait=30*60*1000; // 30 min timeout

  syncPolling=setInterval(async()=>{
    elapsed+=15000;

    if(elapsed>maxWait){
      clearInterval(syncPolling);syncPolling=null;
      isSyncing=false;setSyncButtonState('idle');
      showToast('⏰ Timeout — verificá en Actions','warn');
      return;
    }

    try{
      const resp=await ghApi(`/repos/${REPO}/actions/runs?per_page=5`);
      if(!resp)return;
      const data=await resp.json();
      const runs=data.workflow_runs||[];

      // Find the most recent run
      const latestRun=runs.find(r=>r.name==='Job Hub Scraper & Sync');
      if(!latestRun)return;

      const status=latestRun.status;
      const conclusion=latestRun.conclusion;

      if(status==='queued'){
        updateLiveProgress(10,'⏳ Encolado — esperando runner...');
      }else if(status==='in_progress'){
        // Estimate progress based on elapsed time (typical run ~10-15 min)
        const runTime=(Date.now()-new Date(latestRun.run_started_at).getTime())/1000;
        const estimated=900; // 15 min estimate
        const pct=Math.min(85,Math.max(15,Math.round((runTime/estimated)*85)));
        updateLiveProgress(pct,'🔄 Ejecutando — scrape + sync...');
      }else if(status==='completed'){
        clearInterval(syncPolling);syncPolling=null;
        isSyncing=false;

        if(conclusion==='success'){
          updateLiveProgress(100,'✅ Sync completado exitosamente');
          setSyncButtonState('success');
          showToast('✅ Sync completado — datos actualizados','ok');
          // Reload data after a delay (GitHub Pages cache)
          setTimeout(()=>{load();renderSyncPanel(null)},5000);
        }else{
          updateLiveProgress(0,'❌ Error: '+conclusion);
          setSyncButtonState('error');
          showToast('❌ Workflow falló: '+conclusion+' — verificá en Actions','error');
          setTimeout(()=>{isSyncing=false;setSyncButtonState('idle')},10000);
        }
      }
    }catch(e){
      console.error('Polling error:',e);
    }
  },15000);
}

function updateLiveProgress(pct,message){
  const bar=document.getElementById('live-progress-fill');
  const text=document.getElementById('live-progress-text');
  const phase=document.getElementById('live-phase');
  if(bar)bar.style.width=pct+'%';
  if(text)text.textContent=message;
  if(phase)phase.textContent=pct+'%';
}

function setSyncButtonState(state){
  const btn=document.getElementById('header-sync-btn');
  const panelBtn=document.getElementById('panel-sync-btn');
  const [b,...r]=state==='idle'?['🔄 Sync']:state==='triggering'?['⏳...']:state==='monitoring'?['📡']:state==='success'?['✅']:state==='error'?['❌']:['🔄 Sync'];
  if(btn){btn.textContent=b;btn.disabled=(state!=='idle')}
  if(panelBtn){panelBtn.textContent=b;panelBtn.disabled=(state!=='idle')}
  if(state==='idle'||state==='success'||state==='error'){
    setTimeout(()=>{
      if(btn){btn.textContent='🔄 Sync';btn.disabled=false}
      if(panelBtn){panelBtn.textContent='🔄 Sincronizar Ahora';panelBtn.disabled=false}
    },state==='success'?5000:8000);
  }
}

function triggerSyncFromHeader(){
  triggerWorkflow();
  // Switch to sync tab to show progress
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="sync"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-sync').classList.add('active');
}

// ── Toast notifications ──
function showToast(msg,type='info'){
  const toast=document.createElement('div');
  toast.style.cssText=`position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--surface2);color:var(--text);padding:12px 20px;border-radius:var(--radius);font-size:13px;z-index:9999;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s;`;
  if(type==='error')toast.style.borderColor='var(--accent)';
  if(type==='ok')toast.style.borderColor='var(--green)';
  if(type==='warn')toast.style.borderColor='var(--yellow)';
  toast.textContent=msg;
  document.body.appendChild(toast);
  setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},4000);
}

// ── Load data ──
async function load(){
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    const d=await r.json();
    allJobs=d.jobs||[];
    renderStats(d.breakdown||{});
    renderSources(d);
    document.getElementById('updated-label').textContent=d.updatedAt?'✅ '+new Date(d.updatedAt).toLocaleString('es-CL'):'';
    document.getElementById('webhook-url').textContent=DATA_URL;
    const sources=[...new Set(allJobs.map(j=>j.source))].sort();
    const sel=document.getElementById('source-filter');
    sel.innerHTML='<option value="">📁 Todas las fuentes</option>'+sources.map(s=>`<option value="${s}">${getSourceMeta(s).icon} ${getSourceMeta(s).name}</option>`).join('');
    applyFilters();

    let syncData=null;
    try{const sr=await fetch(SYNC_URL+'?t='+Date.now());syncData=await sr.json()}catch(e){}
    renderSyncPanel(syncData);

    try{const h=await fetch(HISTORY_URL+'?t='+Date.now());const hist=await h.json();renderSyncHistory(hist)}catch(e){}
  }catch(e){document.getElementById('jobs-list').innerHTML='<div class="empty">Error cargando datos.</div>'}
}

// ── Sync Tab ──
function renderSyncPanel(syncData){
  const panel=document.getElementById('sync-panel');
  const hasTokenStored=hasToken();

  let tokenSection=`
    <div class="token-setup">
      <h3>🔑 Conexión con GitHub</h3>
      <p>Necesitás un <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=JobHub%20Sync" target="_blank">Personal Access Token</a> con scopes <strong>repo</strong> + <strong>workflow</strong> para sincronizar desde aquí.</p>
      <div class="token-row">
        <input class="token-input" type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" value="${hasTokenStored?getToken().substring(0,7)+'••••••••••••':''}" onkeydown="if(event.key==='Enter')saveAndTestToken()">
        <button class="btn btn-sync btn-sm" onclick="saveAndTestToken()">${hasTokenStored?'✅ Guardado':'💾 Guardar'}</button>
        <span class="token-status" id="token-status">${hasTokenStored?'<span style="color:var(--green)">● Activo</span>':''}</span>
      </div>
    </div>`;

  let liveProgressSection=`
    <div style="margin:16px 0">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">📊 Progreso en Vivo</div>
      <div class="sync-progress-bar" style="height:16px">
        <div class="sync-progress-fill ${isSyncing?'running':''}" id="live-progress-fill" style="width:${isSyncing?'50':'0'}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span class="sync-progress-text" id="live-progress-text">${isSyncing?'🔄 Monitoreando...':'Esperando sync...'}</span>
        <span class="sync-phase" id="live-phase">${isSyncing?'...':'0%'}</span>
      </div>
    </div>`;

  let statsSection='';
  if(syncData&&syncData.status==='complete'){
    statsSection=`
      <div class="sync-stats">
        <div class="sync-stat"><div class="sync-stat-num green">${syncData.totalInDb||0}</div><div class="sync-stat-label">📊 Total DB</div></div>
        <div class="sync-stat"><div class="sync-stat-num cyan">${syncData.added||0}</div><div class="sync-stat-label">➕ Nuevos</div></div>
        <div class="sync-stat"><div class="sync-stat-num blue">${syncData.updated||0}</div><div class="sync-stat-label">🔄 Actualizados</div></div>
        <div class="sync-stat"><div class="sync-stat-num yellow">${syncData.removed||0}</div><div class="sync-stat-label">🗑️ Expirados</div></div>
        <div class="sync-stat"><div class="sync-stat-num purple">${syncData.deduped||0}</div><div class="sync-stat-label">🔁 Duplicados</div></div>
        <div class="sync-stat"><div class="sync-stat-num orange">${syncData.processed||0}</div><div class="sync-stat-label">📦 Procesados</div></div>
      </div>`;
  }

  let lastSyncText='Nunca';
  if(syncData&&syncData.lastSync){
    lastSyncText=new Date(syncData.lastSync).toLocaleString('es-CL');
  }

  panel.innerHTML=`
    ${tokenSection}
    <div class="sync-status-card">
      <div class="sync-header">
        <div class="sync-title">🔄 Sincronización</div>
        <button class="btn btn-sync" id="panel-sync-btn" onclick="triggerWorkflow()" ${isSyncing?'disabled':''}>
          ${isSyncing?'📡 Monitoreando...':'🔄 Sincronizar Ahora'}
        </button>
      </div>
      ${liveProgressSection}
      ${statsSection}
      <div class="sync-schedule">
        <div class="sync-time">🕐 <strong>Batch 1:</strong> 08:00 UTC (05:00 CL)</div>
        <div class="sync-time">🕐 <strong>Batch 2:</strong> 20:00 UTC (17:00 CL)</div>
        <div class="sync-time">📦 <strong>Lote:</strong> ${syncData&&syncData.batchSize?syncData.batchSize:1500} jobs</div>
        <div class="sync-time">🗑️ <strong>Expiración:</strong> ${syncData&&syncData.maxAgeDays?syncData.maxAgeDays:30} días</div>
        <div class="sync-time">📅 <strong>Último sync:</strong> ${lastSyncText}</div>
      </div>
    </div>
    <div id="sync-history-container"></div>`;

  // If already syncing, restore live state
  if(isSyncing){setSyncButtonState('monitoring')}
}

async function saveAndTestToken(){
  const input=document.getElementById('token-input');
  const val=input.value.trim();
  if(!val||val.length<10){showToast('⚠️ Pegá tu token completo','warn');return}

  const token=val.startsWith('ghp_')?val:'ghp_'+val;
  saveToken(token);
  input.value=token.substring(0,7)+'••••••••••••';

  // Test token
  const resp=await fetch('https://api.github.com/user',{
    headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}
  });
  if(resp.ok){
    const user=await resp.json();
    document.getElementById('token-status').innerHTML=`<span style="color:var(--green)">● ${user.login}</span>`;
    showToast('✅ Token válido — conectado como '+user.login,'ok');
  }else{
    clearToken();
    document.getElementById('token-status').innerHTML='<span style="color:var(--accent)">● Inválido</span>';
    showToast('❌ Token inválido','error');
  }
}

function renderSyncHistory(history){
  if(!Array.isArray(history)||!history.length)return;
  const container=document.getElementById('sync-history-container');
  if(!container)return;
  const recent=history.slice(-10).reverse();
  container.innerHTML=`
    <div class="sync-history">
      <div class="sync-history-title">📜 Últimas sincronizaciones</div>
      ${recent.map(h=>{
        const time=h.lastSync?new Date(h.lastSync).toLocaleString('es-CL'):'?';
        const msg=h.message||'—';
        const ok=h.status==='complete';
        return `<div class="sync-history-item">
          <span class="sync-history-time">${time}</span>
          <span class="sync-history-msg">${msg}</span>
          <span class="sync-history-badge" style="background:${ok?'#22c55e20':'#ef444420'};color:${ok?'var(--green)':'var(--accent)'}">${ok?'✅':'⚠️'}</span>
        </div>`;
      }).join('')}
    </div>`;
}

// ── Stats ──
function renderStats(bd){
  const t=Object.values(bd).reduce((a,b)=>a+b,0);
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-num red">${t}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num green">${(bd['remote-spanish']||0)+(bd['remote-latam']||0)+(bd['remote-spain']||0)+(bd['remote-global']||0)}</div><div class="stat-label">🌐 Remoto</div></div>
    <div class="stat-card"><div class="stat-num blue">${(bd['hybrid-latam']||0)+(bd['hybrid-spain']||0)}</div><div class="stat-label">🏢 Híbrido</div></div>
    <div class="stat-card"><div class="stat-num yellow">${(bd['onsite-latam']||0)+(bd['onsite-spain']||0)}</div><div class="stat-label">📍 Presencial</div></div>`;
}

// ── Sources Tab ──
function renderSources(d){
  const jobs=d.jobs||[];
  const sourcesList=d.sources||[];
  const sourceCounts={},sourceRemote={},sourceCategories={},sourceLatest={};
  jobs.forEach(j=>{
    const s=j.source||'unknown';
    sourceCounts[s]=(sourceCounts[s]||0)+1;
    if(j.remote)sourceRemote[s]=(sourceRemote[s]||0)+1;
    const cat=j.locationPriority||'other';
    sourceCategories[s]=sourceCategories[s]||{};
    sourceCategories[s][cat]=(sourceCategories[s][cat]||0)+1;
    const posted=j.postedAt||j.foundAt||'';
    if(!sourceLatest[s]||posted>sourceLatest[s])sourceLatest[s]=posted;
  });

  const total=jobs.length;
  const topSource=Math.max(...Object.values(sourceCounts),1);
  const apiSources=sourcesList.filter(s=>(SOURCE_META[s]||{}).type==='API');
  const scrapeSources=sourcesList.filter(s=>(SOURCE_META[s]||{}).type==='Scraping');
  const totalRemote=jobs.filter(j=>j.remote).length;
  const sourcesWithJobs=sourcesList.filter(s=>(sourceCounts[s]||0)>0).length;

  document.getElementById('sources-summary').innerHTML=`
    <div class="stat-card"><div class="stat-num purple">${sourcesList.length}</div><div class="stat-label">📡 Fuentes</div></div>
    <div class="stat-card"><div class="stat-num green">${sourcesWithJobs}</div><div class="stat-label">✅ Activas</div></div>
    <div class="stat-card"><div class="stat-num blue">${apiSources.length}</div><div class="stat-label">🔌 APIs</div></div>
    <div class="stat-card"><div class="stat-num orange">${scrapeSources.length}</div><div class="stat-label">🤖 Scrapers</div></div>
    <div class="stat-card"><div class="stat-num red">${total}</div><div class="stat-label">📊 Jobs</div></div>
    <div class="stat-card"><div class="stat-num green">${totalRemote}</div><div class="stat-label">🌐 Remote</div></div>`;

  const sortedSources=Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]);
  const top8=sortedSources.slice(0,8);
  const othersCount=sortedSources.slice(8).reduce((a,b)=>a+b[1],0);
  const pieItems=top8.map(([s,c])=>({label:getSourceMeta(s).name,count:c,color:getSourceMeta(s).color,pct:((c/total)*100).toFixed(1)}));
  if(othersCount>0)pieItems.push({label:'Otros',count:othersCount,color:'#94a3b8',pct:((othersCount/total)*100).toFixed(1)});

  let gradParts=[];let cumPct=0;
  pieItems.forEach(item=>{gradParts.push(`${item.color} ${cumPct}% ${cumPct+parseFloat(item.pct)}%`);cumPct+=parseFloat(item.pct)});
  document.getElementById('sources-pie').innerHTML=`
    <div class="pie-chart" style="background:conic-gradient(${gradParts.join(',')});box-shadow:0 0 0 4px var(--surface),0 0 0 6px var(--surface2)"></div>
    <div class="pie-legend">${pieItems.map(i=>`<div class="pie-legend-item"><div class="pie-dot" style="background:${i.color}"></div><span>${i.label} <strong>${i.count}</strong> (${i.pct}%)</span></div>`).join('')}</div>`;

  const allSources=sourcesList.length>0?sourcesList:sortedSources.map(([s])=>s);
  document.getElementById('sources-grid').innerHTML=allSources.map(s=>{
    const m=getSourceMeta(s);const count=sourceCounts[s]||0;const remote=sourceRemote[s]||0;
    const cats=sourceCategories[s]||{};const pct=((count/topSource)*100).toFixed(0);
    const lastDate=sourceLatest[s]?new Date(sourceLatest[s]).toLocaleDateString('es-CL',{month:'short',day:'numeric'}):'N/A';
    let statusClass='status-off',statusText='Sin datos';
    if(count>50){statusClass='status-ok';statusText='🟢 Excelente';}
    else if(count>10){statusClass='status-ok';statusText='🟢 Activa';}
    else if(count>0){statusClass='status-warn';statusText='🟡 Baja';}
    const catBars=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,n])=>{
      const cc={'remote-spanish':'#ef4444','remote-latam':'#22c55e','remote-spain':'#3b82f6','remote-global':'#8b5cf6','hybrid-latam':'#eab308','hybrid-spain':'#f97316','onsite-latam':'#94a3b8','onsite-spain':'#64748b','other':'#475569'};
      return `<div class="source-detail"><span style="color:${cc[cat]||'#94a3b8'}">${cat}</span> <span>${n}</span></div>`;
    }).join('');
    return `<div class="source-card">
      <div class="source-card-header"><div class="source-name">${m.icon} ${m.name}</div><span class="source-status ${statusClass}">${statusText}</span></div>
      <div class="source-count">${count}</div>
      <div class="source-bar"><div class="source-bar-fill" style="width:${pct}%;background:${m.color}"></div></div>
      <div class="source-details">
        <div class="source-detail">Tipo <span>${m.type}</span></div>
        <div class="source-detail">Remotos <span>${remote}</span></div>
        <div class="source-detail">Presencial <span>${count-remote}</span></div>
        <div class="source-detail">Último <span>${lastDate}</span></div>
      </div>
      ${catBars?`<div style="margin-top:10px">${catBars}</div>`:''}
    </div>`;
  }).join('');
}

// ── Jobs Tab ──
function setCat(btn){
  document.querySelectorAll('.toolbar .btn-outline[data-cat]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');curCat=btn.dataset.cat;curPage=1;applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const src=document.getElementById('source-filter').value;
  filtered=allJobs.filter(j=>{
    if(curCat==='remote'&&!j.remote)return false;
    if(curCat==='hybrid'&&!j.locationPriority?.startsWith('hybrid'))return false;
    if(curCat==='onsite'&&!j.locationPriority?.startsWith('onsite'))return false;
    if(['remote-spanish','remote-latam','remote-spain'].includes(curCat)&&j.locationPriority!==curCat)return false;
    if(src&&j.source!==src)return false;
    if(q&&!j.title?.toLowerCase().includes(q)&&!j.company?.toLowerCase().includes(q))return false;
    return true;
  });
  render();
}

function render(){
  const t=filtered.length,tp=Math.max(1,Math.ceil(t/PP));
  if(curPage>tp)curPage=tp;
  const s=(curPage-1)*PP,p=filtered.slice(s,s+PP);
  document.getElementById('count-label').textContent=t+' vacantes';
  document.getElementById('page-label').textContent='Pág '+curPage+'/'+tp;
  if(!p.length){document.getElementById('jobs-list').innerHTML='<div class="empty">Sin resultados.</div>';document.getElementById('pagination').innerHTML='';return;}
  document.getElementById('jobs-list').innerHTML=p.map(j=>{
    const bc=j.remote?'badge-remote':j.locationPriority?.startsWith('hybrid')?'badge-hybrid':'badge-onsite';
    const bt=j.remote?'Remoto':j.locationPriority?.startsWith('hybrid')?'Híbrido':'Presencial';
    const sal=j.salary&&j.salary!=='No publicado'?`<span class="job-salary">💰 ${esc(j.salary)}</span>`:'';
    const sm=getSourceMeta(j.source);
    return `<div class="job-card">
      <div>
        <div class="job-title"><a href="${j.sourceUrl}" target="_blank" rel="noopener">${esc(j.title)}</a></div>
        <div class="job-company">${esc(j.company)}${j.location?' · '+esc(j.location):''}</div>
        <div class="job-meta"><span class="badge ${bc}">${bt}</span>${sal}<span class="job-source">${sm.icon} ${sm.name}</span></div>
      </div>
      <div class="job-actions"><a href="${j.sourceUrl}" target="_blank" rel="noopener" class="btn btn-outline" style="font-size:11px;padding:4px 12px">Ver →</a></div>
    </div>`;
  }).join('');
  let ph='';
  if(tp>1){
    ph+=`<button class="btn btn-outline" onclick="go(${curPage-1})" ${curPage<=1?'disabled':''}>←</button> `;
    for(let i=1;i<=Math.min(tp,9);i++)ph+=`<button class="btn btn-outline ${i===curPage?'active':''}" onclick="go(${i})" style="padding:4px 10px;font-size:12px">${i}</button> `;
    if(tp>9)ph+=' ... ';
    ph+=`<button class="btn btn-outline" onclick="go(${curPage+1})" ${curPage>=tp?'disabled':''}>→</button>`;
  }
  document.getElementById('pagination').innerHTML=ph;
}

function go(p){curPage=p;applyFilters();window.scrollTo({top:0,behavior:'smooth'})}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function copyWebhook(){navigator.clipboard.writeText(DATA_URL).then(()=>{const e=document.getElementById('webhook-url'),o=e.textContent;e.textContent='✅ Copiado!';setTimeout(()=>e.textContent=o,1500)})}

load();
</script>
